<!-- HTML header for doxygen 1.9.1-->
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "https://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
  <head>
    <meta http-equiv="Content-Type" content="text/xhtml;charset=UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=9" />
    <meta name="generator" content="Doxygen $doxygenversion" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!--BEGIN PROJECT_NAME-->
    <title>$projectname: $title</title>
    <!--END PROJECT_NAME-->
    <!--BEGIN !PROJECT_NAME-->
    <title>$title</title>
    <!--END !PROJECT_NAME-->
    <link href="$relpath^tabs.css" rel="stylesheet" type="text/css" />
    <link rel="icon" href="$relpath^favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="$relpath^favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="$relpath^favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="$relpath^apple-touch-icon.png"
    />
    <script type="text/javascript" src="$relpath^jquery.js"></script>
    <script type="text/javascript" src="$relpath^dynsections.js"></script>
    $treeview $search $mathjax
    <link href="$relpath^$stylesheet" rel="stylesheet" type="text/css" />
    $extrastylesheet
    <script
      type="text/javascript"
      src="$relpath^doxygen-awesome-darkmode-toggle.js"
    ></script>
    <script type="text/javascript">
      DoxygenAwesomeDarkModeToggle.init();
    </script>
    <script
      data-goatcounter="https://munk2d.goatcounter.com/count"
      async
      src="//gc.zgo.at/count.js"
    ></script>
    <style type="text/css">
      #titlearea table {
        width: 100%;
        border-collapse: collapse;
      }

      #titlearea tbody,
      #titlearea tr {
        display: flex;
        align-items: center;
        width: 100%;
      }

      #projectalign {
        flex: 1 1 auto;
        min-width: 0;
      }

      #projectsearch {
        flex: 0 0 auto;
        padding-left: 1rem;
      }

      @media screen and (max-width: 767px) {
        #titlearea tbody,
        #titlearea tr {
          flex-wrap: wrap;
          align-items: flex-start;
        }

        #projectsearch {
          width: 100%;
          padding-left: 0;
          padding-top: 0.75rem;
        }

        #projectsearch #MSearchBox {
          width: 100%;
        }

        #projectsearch #MSearchField {
          width: calc(100% - 64px);
        }
      }

      @media screen and (min-width: 768px) {
        html {
          --side-nav-fixed-width: 380px;
          --top-height: 150px;
        }

        #top {
          overflow: visible;
        }

        #titlearea {
          padding-top: calc(var(--searchbar-height) + var(--spacing-large) + 8px);
        }

        #projectname {
          white-space: normal;
          line-height: 1.2;
        }
      }
    </style>
  </head>
  <body>
    <div id="top">
      <!-- do not remove this div, it is closed by doxygen! -->

      <!--BEGIN TITLEAREA-->
      <div id="titlearea">
        <table cellspacing="0" cellpadding="0">
          <tbody>
            <tr style="height: 56px">
              <!--BEGIN PROJECT_LOGO-->
              <td id="projectlogo">
                <img alt="Logo" src="$relpath^$projectlogo" style="height: 48px; width: auto" />
              </td>
              <!--END PROJECT_LOGO-->
              <!--BEGIN PROJECT_NAME-->
              <td id="projectalign" style="padding-left: 0.5em">
                <div id="projectname">
                  $projectname
                  <!--BEGIN PROJECT_NUMBER-->&#160;<span id="projectnumber"
                    >$projectnumber</span
                  ><!--END PROJECT_NUMBER-->
                </div>
                <!--BEGIN PROJECT_BRIEF-->
                <div id="projectbrief">$projectbrief</div>
                <!--END PROJECT_BRIEF-->
              </td>
              <!--END PROJECT_NAME-->
              <!--BEGIN !PROJECT_NAME-->
              <!--BEGIN PROJECT_BRIEF-->
              <td style="padding-left: 0.5em">
                <div id="projectbrief">$projectbrief</div>
              </td>
              <!--END PROJECT_BRIEF-->
              <!--END !PROJECT_NAME-->
              <!--BEGIN DISABLE_INDEX-->
              <!--BEGIN SEARCHENGINE-->
              <td id="projectsearch">$searchbox</td>
              <!--END SEARCHENGINE-->
              <!--END DISABLE_INDEX-->
            </tr>
          </tbody>
        </table>
      </div>
      <!--END TITLEAREA-->
      <!-- end header part -->
    </div>
  </body>
</html>
